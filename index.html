<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор выражений</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 520px;
      overflow: hidden;
    }
    .card-header { background: #1e2a3a; color: white; padding: 1.4rem 1.8rem; }
    .card-header h1 { font-size: 1.4rem; font-weight: 600; }
    .card-header p { font-size: 0.85rem; opacity: 0.65; margin-top: 4px; }
    .card-body { padding: 1.8rem; }
    label { display: block; font-size: 0.85rem; font-weight: 500; color: #374151; margin-bottom: 6px; }
    input[type="text"] {
      width: 100%; padding: 0.7rem 1rem; font-size: 1.1rem;
      font-family: monospace; border: 1.5px solid #d1d5db;
      border-radius: 10px; outline: none; transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #3b82f6; }
    .hint { font-size: 0.78rem; color: #9ca3af; margin-top: 5px; }
    button {
      width: 100%; margin-top: 1rem; padding: 0.75rem; font-size: 1rem;
      font-weight: 600; background: #3b82f6; color: white; border: none;
      border-radius: 10px; cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #2563eb; }
    #output { margin-top: 1.4rem; }
    .clean-notice {
      background: #eff6ff; border-left: 3px solid #3b82f6;
      border-radius: 8px; padding: 0.6rem 0.9rem;
      font-size: 0.85rem; color: #1d4ed8; margin-bottom: 1rem;
    }
    .steps-label {
      font-size: 0.8rem; font-weight: 600; color: #6b7280;
      text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px;
    }
    .steps-list {
      list-style: none; border: 1px solid #e5e7eb;
      border-radius: 10px; overflow: hidden; margin-bottom: 1rem;
    }
    .steps-list li {
      padding: 0.55rem 0.9rem; font-family: monospace;
      font-size: 0.95rem; border-bottom: 1px solid #f3f4f6; color: #374151;
    }
    .steps-list li:last-child { border-bottom: none; }
    .result-box {
      text-align: center; background: #1e2a3a; color: white;
      border-radius: 10px; padding: 1rem; font-size: 1.8rem; font-weight: 700;
    }
    .error-box {
      background: #fef2f2; border-left: 3px solid #ef4444;
      border-radius: 8px; padding: 0.7rem 1rem; color: #b91c1c; font-size: 0.9rem;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <h1>Калькулятор выражений</h1>
    <p>Поддерживает + и * с учётом приоритета операторов</p>
  </div>
  <div class="card-body">
    <label for="exprInput">Введите выражение</label>
    <input type="text" id="exprInput" placeholder="например: 2 + 3 * 4" value="2 + 3 * 4">
    <p class="hint">Допустимые символы: цифры, точка, +, *</p>
    <button id="calcBtn">Вычислить</button>
    <div id="output"></div>
  </div>
</div>

<script src="task.js"></script>
<script>
  const input = document.getElementById("exprInput");
  const btn = document.getElementById("calcBtn");
  const output = document.getElementById("output");

  function calculate() {
    const raw = input.value;
    const cleaned = Calculator.sanitize(raw);
    let html = "";

    if (cleaned !== raw.trim()) {
      html += `
        <div class="clean-notice">
          Строка очищена от лишних символов:<br>
          <strong>было:</strong> "${raw}"<br>
          <strong>стало:</strong> "${cleaned}"
        </div>`;
    }

    try {
      const { result, steps } = Calculator.evaluate(cleaned);

      if (steps.length > 0) {
        html += `<p class="steps-label">Шаги вычисления</p><ul class="steps-list">`;
        steps.forEach((step, i) => {
          html += `<li>${i + 1}. ${step}</li>`;
        });
        html += `</ul>`;
      }

      html += `<div class="result-box">= ${result}</div>`;
    } catch (err) {
      html += `<div class="error-box">Ошибка: ${err.message}</div>`;
    }

    output.innerHTML = html;
  }

  btn.addEventListener("click", calculate);
  input.addEventListener("input", calculate);
  calculate();
</script>

</body>
</html>
